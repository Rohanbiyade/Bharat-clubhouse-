<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bharat Club</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Rajdhani:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Rajdhani',sans-serif;background:#0a0a1a}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1a1a3e}
::-webkit-scrollbar-thumb{background:linear-gradient(#ff6b35,#ff2d78);border-radius:3px}
@keyframes glow{0%,100%{text-shadow:0 0 10px #ff6b35,0 0 20px #ff6b35,0 0 40px #ff2d78}50%{text-shadow:0 0 20px #ff6b35,0 0 40px #ff6b35,0 0 80px #ff2d78}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse-ring{0%{transform:scale(.8);opacity:1}100%{transform:scale(2);opacity:0}}
@keyframes spin-wheel{0%{transform:rotate(0)}100%{transform:rotate(3600deg)}}
@keyframes crash-line{0%{width:0}100%{width:100%}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.glow-text{animation:glow 2s infinite}
.float-anim{animation:float 3s ease-in-out infinite}
.glass{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1)}
.glass-strong{background:rgba(255,255,255,.08);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.15)}
.neon-border{border:1px solid rgba(255,107,53,.3);box-shadow:0 0 15px rgba(255,107,53,.1)}
.neon-btn{background:linear-gradient(135deg,#ff6b35,#ff2d78);box-shadow:0 4px 20px rgba(255,45,120,.3);transition:all .3s}
.neon-btn:hover{box-shadow:0 6px 30px rgba(255,45,120,.5);transform:translateY(-2px)}
.neon-btn:active{transform:translateY(0)}
.game-card{transition:all .3s cubic-bezier(.4,0,.2,1)}
.game-card:hover{transform:translateY(-8px) scale(1.02);box-shadow:0 20px 40px rgba(255,107,53,.2)}
.slide-up{animation:slideUp .5s ease-out both}
.fade-in{animation:fadeIn .3s ease-out}
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:12px 24px;border-radius:12px;color:#fff;font-weight:600;animation:slideUp .3s ease-out;pointer-events:none}
.toast-success{background:linear-gradient(135deg,#00c853,#00e676)}
.toast-error{background:linear-gradient(135deg,#ff1744,#ff5252)}
.shimmer{background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.05) 50%,transparent 100%);background-size:200% 100%;animation:shimmer 2s infinite}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.sidebar-item{transition:all .2s}
.sidebar-item:hover,.sidebar-item.active{background:rgba(255,107,53,.15);border-left:3px solid #ff6b35}
.multiplier-text{font-family:'Orbitron',monospace}
</style>
  <script>
tailwind.config={theme:{extend:{colors:{primary:'#ff6b35',secondary:'#ff2d78',dark:'#0a0a1a',darker:'#06061a',panel:'#12122e'}}}}
</script>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-hidden" style="background:linear-gradient(135deg,#0a0a1a 0%,#12122e 50%,#0a0a1a 100%)">
   <!-- TOAST -->
   <div id="toast-container"></div><!-- AUTH SCREEN -->
   <div id="auth-screen" class="h-full w-full flex items-center justify-center overflow-auto" style="background:radial-gradient(ellipse at center,#1a1a4e 0%,#0a0a1a 70%)">
    <div class="w-full max-w-md mx-4 slide-up">
     <div class="text-center mb-8">
      <h1 class="text-5xl font-black glow-text" style="font-family:'Orbitron',monospace;color:#ff6b35">BHARAT CLUB</h1>
      <p class="text-gray-400 mt-2 text-lg">Premium Gaming Experience</p>
     </div>
     <div class="glass-strong rounded-2xl p-8">
      <div class="flex mb-6 rounded-xl overflow-hidden border border-white/10">
       <button id="tab-login" onclick="switchAuthTab('login')" class="flex-1 py-3 font-bold text-lg transition-all bg-gradient-to-r from-primary to-secondary text-white">Login</button> <button id="tab-register" onclick="switchAuthTab('register')" class="flex-1 py-3 font-bold text-lg transition-all text-gray-400">Register</button>
      </div>
      <div id="login-form">
       <div class="mb-4"><label class="text-gray-300 text-sm font-semibold block mb-1">Username</label><input id="login-user" type="text" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-primary focus:outline-none transition" placeholder="Enter username">
       </div>
       <div class="mb-6"><label class="text-gray-300 text-sm font-semibold block mb-1">Password</label><input id="login-pass" type="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-primary focus:outline-none transition" placeholder="Enter password">
       </div><button onclick="handleLogin()" class="w-full neon-btn text-white font-bold py-3 rounded-xl text-lg">Login</button>
      </div>
      <div id="register-form" class="hidden">
       <div class="mb-4"><label class="text-gray-300 text-sm font-semibold block mb-1">Username</label><input id="reg-user" type="text" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-primary focus:outline-none transition" placeholder="Choose username">
       </div>
       <div class="mb-4"><label class="text-gray-300 text-sm font-semibold block mb-1">Password</label><input id="reg-pass" type="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-primary focus:outline-none transition" placeholder="Create password">
       </div>
       <div class="mb-6"><label class="text-gray-300 text-sm font-semibold block mb-1">Confirm Password</label><input id="reg-pass2" type="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-primary focus:outline-none transition" placeholder="Confirm password">
       </div><button onclick="handleRegister()" class="w-full neon-btn text-white font-bold py-3 rounded-xl text-lg">Create Account</button>
      </div>
      <p id="auth-error" class="text-red-400 text-sm mt-3 text-center hidden"></p>
      <p class="text-center text-gray-500 text-xs mt-6">🎰 Demo Platform — No Real Money</p>
     </div>
    </div>
   </div><!-- MAIN APP -->
   <div id="main-app" class="h-full w-full hidden" style="display:none">
    <div class="h-full flex flex-col">
     <!-- TOP NAV -->
     <nav class="glass-strong px-4 py-3 flex items-center justify-between flex-shrink-0 z-30 border-b border-white/5">
      <div class="flex items-center gap-3">
       <button onclick="toggleSidebar()" class="lg:hidden text-gray-300 p-1"><i data-lucide="menu" class="w-6 h-6"></i></button>
       <h1 id="nav-title" class="text-2xl font-black text-primary" style="font-family:'Orbitron',monospace">BHARAT CLUB</h1>
      </div>
      <div class="flex items-center gap-4">
       <div class="glass rounded-xl px-4 py-2 flex items-center gap-2">
        <span class="text-yellow-400 text-lg">💰</span> <span id="nav-balance" class="text-white font-bold multiplier-text">₹0</span>
       </div>
       <div class="hidden sm:flex items-center gap-2 text-gray-300">
        <i data-lucide="user" class="w-5 h-5"></i> <span id="nav-username" class="font-semibold"></span>
       </div><button onclick="handleLogout()" class="text-gray-400 hover:text-red-400 transition p-1" title="Logout"><i data-lucide="log-out" class="w-5 h-5"></i></button>
      </div>
     </nav>
     <div class="flex flex-1 overflow-hidden">
      <!-- SIDEBAR -->
      <aside id="sidebar" class="w-60 glass-strong border-r border-white/5 flex-shrink-0 overflow-y-auto hidden lg:block z-20">
       <div class="p-4">
        <div class="text-center mb-6 pt-2">
         <div class="w-16 h-16 rounded-full mx-auto mb-2 flex items-center justify-center text-3xl" style="background:linear-gradient(135deg,#ff6b35,#ff2d78)">
          👤
         </div>
         <p id="side-username" class="text-white font-bold"></p>
         <p id="side-uid" class="text-gray-500 text-xs"></p>
        </div>
        <nav class="space-y-1">
         <button onclick="navigate('lobby')" class="sidebar-item active w-full text-left px-4 py-3 rounded-xl text-gray-300 flex items-center gap-3 font-semibold" data-nav="lobby"><i data-lucide="gamepad-2" class="w-5 h-5"></i>Game Lobby</button> <button onclick="navigate('profile')" class="sidebar-item w-full text-left px-4 py-3 rounded-xl text-gray-300 flex items-center gap-3 font-semibold" data-nav="profile"><i data-lucide="user" class="w-5 h-5"></i>Profile</button> <button onclick="navigate('deposit')" class="sidebar-item w-full text-left px-4 py-3 rounded-xl text-gray-300 flex items-center gap-3 font-semibold" data-nav="deposit"><i data-lucide="wallet" class="w-5 h-5"></i>Deposit</button> <button onclick="navigate('withdraw')" class="sidebar-item w-full text-left px-4 py-3 rounded-xl text-gray-300 flex items-center gap-3 font-semibold" data-nav="withdraw"><i data-lucide="banknote" class="w-5 h-5"></i>Withdraw</button>
        </nav>
       </div>
      </aside><!-- MOBILE SIDEBAR OVERLAY -->
      <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-10 hidden lg:hidden" onclick="toggleSidebar()"></div><!-- MAIN CONTENT -->
      <main id="main-content" class="flex-1 overflow-y-auto p-4 md:p-6"></main>
     </div>
    </div>
   </div>
  </div>
  <script>
// ==================== STATE ====================
let currentUser = null;
let currentPage = 'lobby';
let sidebarOpen = false;
let activeGame = null;
let gameInterval = null;

const GAMES = [
  {id:'chicken',name:'Chicken Road 2',icon:'🐔',color:'#ff6b35',desc:'Jump & survive!'},
  {id:'aviator',name:'Aviator',icon:'✈️',color:'#e91e63',desc:'Cash out before crash!'},
  {id:'mines',name:'Mines',icon:'💣',color:'#9c27b0',desc:'Avoid the bombs!'},
  {id:'roulette',name:'Roulette',icon:'🎡',color:'#f44336',desc:'Spin the wheel!'},
  {id:'slots',name:'Slots Machine',icon:'🎰',color:'#ff9800',desc:'Match & win big!'},
  {id:'blackjack',name:'Blackjack',icon:'🃏',color:'#4caf50',desc:'Beat the dealer!'},
  {id:'teenpatti',name:'Teen Patti',icon:'🂡',color:'#e91e63',desc:'Indian poker classic!'},
  {id:'dragon',name:'Dragon Tiger',icon:'🐉',color:'#f44336',desc:'Dragon or Tiger?'},
  {id:'andarbahar',name:'Andar Bahar',icon:'🎴',color:'#ff5722',desc:'Left or Right?'},
  {id:'crash',name:'Crash Game',icon:'📈',color:'#00bcd4',desc:'Ride the multiplier!'},
  {id:'dice',name:'Dice Roll',icon:'🎲',color:'#8bc34a',desc:'Roll & win!'},
  {id:'plinko',name:'Plinko',icon:'⚪',color:'#03a9f4',desc:'Drop the ball!'},
  {id:'poker',name:'Poker',icon:'♠️',color:'#607d8b',desc:'Classic poker!'},
  {id:'baccarat',name:'Baccarat',icon:'💎',color:'#9c27b0',desc:'Player or Banker?'},
  {id:'wheel',name:'Lucky Wheel',icon:'🎯',color:'#ff6b35',desc:'Spin to win!'},
  {id:'color',name:'Color Prediction',icon:'🔴',color:'#e91e63',desc:'Predict the color!'},
  {id:'coin',name:'Coin Flip',icon:'🪙',color:'#ffc107',desc:'Heads or Tails?'},
  {id:'horse',name:'Horse Racing',icon:'🏇',color:'#795548',desc:'Pick your horse!'},
  {id:'keno',name:'Keno',icon:'🔢',color:'#673ab7',desc:'Lucky numbers!'},
  {id:'numguess',name:'Number Guess',icon:'❓',color:'#009688',desc:'Guess right!'}
];

// ==================== UTILS ====================
function showToast(msg,type='success'){
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;
  t.textContent=msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
function genUID(){return 'BC'+Math.random().toString(36).substr(2,8).toUpperCase()}
function saveUsers(users){localStorage.setItem('bc_users',JSON.stringify(users))}
function getUsers(){return JSON.parse(localStorage.getItem('bc_users')||'{}');}
function saveSession(u){localStorage.setItem('bc_session',u);currentUser=getUsers()[u];updateUI()}
function clearSession(){localStorage.removeItem('bc_session');currentUser=null}
function updateBalance(amt){
  const users=getUsers();
  users[currentUser.username].balance+=amt;
  saveUsers(users);
  currentUser=users[currentUser.username];
  document.getElementById('nav-balance').textContent='₹'+currentUser.balance.toLocaleString();
}

// ==================== AUTH ====================
function switchAuthTab(tab){
  document.getElementById('login-form').classList.toggle('hidden',tab!=='login');
  document.getElementById('register-form').classList.toggle('hidden',tab!=='register');
  document.getElementById('tab-login').className=tab==='login'?'flex-1 py-3 font-bold text-lg transition-all bg-gradient-to-r from-primary to-secondary text-white':'flex-1 py-3 font-bold text-lg transition-all text-gray-400';
  document.getElementById('tab-register').className=tab==='register'?'flex-1 py-3 font-bold text-lg transition-all bg-gradient-to-r from-primary to-secondary text-white':'flex-1 py-3 font-bold text-lg transition-all text-gray-400';
  document.getElementById('auth-error').classList.add('hidden');
}
function showAuthError(msg){const e=document.getElementById('auth-error');e.textContent=msg;e.classList.remove('hidden')}
function handleRegister(){
  const u=document.getElementById('reg-user').value.trim(),p=document.getElementById('reg-pass').value,p2=document.getElementById('reg-pass2').value;
  if(!u||!p)return showAuthError('Fill all fields');
  if(p.length<4)return showAuthError('Password too short');
  if(p!==p2)return showAuthError('Passwords do not match');
  const users=getUsers();
  if(users[u])return showAuthError('Username taken');
  users[u]={username:u,password:p,uid:genUID(),balance:0};
  saveUsers(users);
  saveSession(u);
  showMainApp();
  showToast('Account created! Balance: ₹0 - Deposit to play');
}
function handleLogin(){
  const u=document.getElementById('login-user').value.trim(),p=document.getElementById('login-pass').value;
  if(!u||!p)return showAuthError('Fill all fields');
  const users=getUsers();
  if(!users[u]||users[u].password!==p)return showAuthError('Invalid credentials');
  saveSession(u);
  showMainApp();
  showToast('Welcome back, '+u+'!');
}
function handleLogout(){clearSession();document.getElementById('main-app').style.display='none';document.getElementById('auth-screen').style.display='flex';cleanupGame()}

function showMainApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  updateUI();
  navigate('lobby');
  lucide.createIcons();
}
function updateUI(){
  if(!currentUser)return;
  document.getElementById('nav-balance').textContent='₹'+currentUser.balance.toLocaleString();
  document.getElementById('nav-username').textContent=currentUser.username;
  document.getElementById('side-username').textContent=currentUser.username;
  document.getElementById('side-uid').textContent=currentUser.uid;
}

// ==================== NAV ====================
function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  const sb=document.getElementById('sidebar'),ov=document.getElementById('sidebar-overlay');
  if(sidebarOpen){sb.classList.remove('hidden');sb.classList.add('fixed','top-14','left-0','bottom-0');ov.classList.remove('hidden')}
  else{sb.classList.add('hidden');sb.classList.remove('fixed','top-14','left-0','bottom-0');ov.classList.add('hidden')}
}
function navigate(page){
  cleanupGame();
  currentPage=page;
  document.querySelectorAll('.sidebar-item').forEach(b=>{b.classList.toggle('active',b.dataset.nav===page)});
  if(sidebarOpen)toggleSidebar();
  const mc=document.getElementById('main-content');
  mc.scrollTop=0;
  if(page==='lobby')renderLobby();
  else if(page==='profile')renderProfile();
  else if(page==='deposit')renderDeposit();
  else if(page==='withdraw')renderWithdraw();
  lucide.createIcons();
}
function cleanupGame(){if(gameInterval){clearInterval(gameInterval);gameInterval=null}activeGame=null}

// ==================== PAGES ====================
function renderLobby(){
  const mc=document.getElementById('main-content');
  mc.innerHTML=`<div class="mb-6 slide-up"><h2 class="text-3xl font-black text-white" style="font-family:'Orbitron',monospace">Game Lobby</h2><p class="text-gray-400 mt-1">Choose your game and start winning!</p></div>
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-4">${GAMES.map((g,i)=>`
    <div class="game-card glass rounded-2xl p-4 cursor-pointer text-center slide-up" style="animation-delay:${i*30}ms;border:1px solid ${g.color}22" onclick="openGame('${g.id}')">
      <div class="text-4xl mb-2 float-anim" style="animation-delay:${i*100}ms">${g.icon}</div>
      <h3 class="text-white font-bold text-sm leading-tight">${g.name}</h3>
      <p class="text-gray-500 text-xs mt-1">${g.desc}</p>
    </div>`).join('')}</div>`;
}
function renderProfile(){
  document.getElementById('main-content').innerHTML=`<div class="max-w-lg mx-auto slide-up">
    <div class="glass-strong rounded-2xl p-8 text-center">
      <div class="w-24 h-24 rounded-full mx-auto mb-4 flex items-center justify-center text-5xl" style="background:linear-gradient(135deg,#ff6b35,#ff2d78)">👤</div>
      <h2 class="text-2xl font-black text-white">${currentUser.username}</h2>
      <p class="text-gray-500 text-sm mt-1">${currentUser.uid}</p>
      <div class="mt-6 grid grid-cols-1 gap-3">
        <div class="glass rounded-xl p-4"><p class="text-gray-400 text-sm">Balance</p><p class="text-2xl font-bold text-yellow-400 multiplier-text">₹${currentUser.balance.toLocaleString()}</p></div>
        <div class="glass rounded-xl p-4"><p class="text-gray-400 text-sm">Member Since</p><p class="text-white font-bold">Today</p></div>
      </div>
    </div></div>`;
}
function renderDeposit(){
  document.getElementById('main-content').innerHTML=`<div class="max-w-lg mx-auto slide-up">
    <div class="glass-strong rounded-2xl p-6 md:p-8">
      <h2 class="text-2xl font-black text-white mb-6 flex items-center gap-2"><i data-lucide="wallet" class="w-6 h-6 text-primary"></i>Deposit</h2>
      <div class="glass rounded-xl p-4 mb-6">
        <p class="text-gray-400 text-sm mb-1">Send payment to UPI</p>
        <div class="flex items-center gap-2">
          <code class="text-primary font-bold text-lg flex-1">rohandxzdeveloper@fam</code>
          <button onclick="navigator.clipboard.writeText('rohandxzdeveloper@fam');showToast('UPI copied!')" class="neon-btn px-3 py-1.5 rounded-lg text-white text-sm font-bold">Copy</button>
        </div>
      </div>
      <div class="space-y-4">
        <div><label class="text-gray-300 text-sm font-semibold block mb-1">Amount (₹)</label><input id="dep-amount" type="number" min="100" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-primary focus:outline-none" placeholder="Min ₹100"></div>
        <div><label class="text-gray-300 text-sm font-semibold block mb-1">UTR Number</label><input id="dep-utr" type="text" maxlength="18" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-primary focus:outline-none" placeholder="10-18 digit UTR"></div>
        <div><label class="text-gray-300 text-sm font-semibold block mb-1">Payment Screenshot</label><input id="dep-screenshot" type="file" accept="image/*" onchange="document.getElementById('dep-filename').textContent=this.files[0]?.name||''" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-gray-400 focus:border-primary
